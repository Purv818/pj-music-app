<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self' https: data: blob:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; media-src 'self' blob: file: content:; connect-src 'self' wss: https:;" />
  <meta name="theme-color" content="#0f0f1a" />
  <title>PJ Music</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PJ Music" />
  <link rel="apple-touch-icon" href="/icons/icon.svg" />
  <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- App Styles -->
  <link rel="stylesheet" href="src/css/variables.css" />
  <link rel="stylesheet" href="src/css/reset.css" />
  <link rel="stylesheet" href="src/css/components.css" />
  <link rel="stylesheet" href="src/css/layout.css" />
  <link rel="stylesheet" href="src/css/player.css" />
  <link rel="stylesheet" href="src/css/pages.css" />
  <link rel="stylesheet" href="src/css/animations.css" />

  <style>
    /* Background canvas ke upar content aaye */
    #main-screen > *:not(#bg-canvas) { position: relative; z-index: 1; }
    #bg-canvas { position: fixed !important; }

    /* roundRect polyfill for older Android WebView */
    :root { --anim-ready: 1; }
  </style>
</head>
<body>

  <!-- ─── App Shell ──────────────────────────────────────────────────── -->
  <div id="app">

    <!-- Auth screens (shown when not logged in) -->
    <div id="auth-screen" class="screen hidden">
      <!-- Injected by auth.js -->
    </div>

    <!-- Main app (shown when logged in) -->
    <div id="main-screen" class="screen hidden">

      <!-- Top Bar -->
      <header class="top-bar" id="top-bar">
        <button class="icon-btn" id="menu-btn" aria-label="Open menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <h1 class="app-title" id="page-title">PJ Music</h1>
        <div class="top-bar-actions">
          <button class="icon-btn" id="search-btn" aria-label="Search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </button>
          <button class="icon-btn" id="theme-toggle" aria-label="Toggle theme">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="theme-icon">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- Page Container -->
      <main class="page-container" id="page-container">
        <!-- Pages are rendered here by the router -->
      </main>

      <!-- Bottom Navigation -->
      <nav class="bottom-nav" id="bottom-nav" role="navigation" aria-label="Main navigation">
        <button class="nav-item active" data-page="home" aria-label="Home">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          <span>Home</span>
        </button>
        <button class="nav-item" data-page="library" aria-label="Library">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
          </svg>
          <span>Library</span>
        </button>
        <button class="nav-item" data-page="friends" aria-label="Friends">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
          <span>Friends</span>
        </button>
        <button class="nav-item" data-page="rooms" aria-label="Rooms">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <rect x="9" y="14" width="6" height="8"/>
          </svg>
          <span>Rooms</span>
        </button>
        <button class="nav-item" data-page="profile" aria-label="Profile">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <span>Profile</span>
        </button>
      </nav>

      <!-- Mini Player (persistent, above bottom nav) -->
      <div class="mini-player hidden" id="mini-player" role="complementary" aria-label="Now playing">
        <div class="mini-player__artwork">
          <img src="" alt="Album art" id="mini-artwork" />
          <div class="mini-player__artwork-placeholder">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
            </svg>
          </div>
        </div>
        <div class="mini-player__info">
          <span class="mini-player__title" id="mini-title">No song playing</span>
          <span class="mini-player__artist" id="mini-artist"></span>
        </div>
        <div class="mini-player__controls">
          <button class="icon-btn" id="mini-prev" aria-label="Previous">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
          </button>
          <button class="icon-btn play-btn" id="mini-play" aria-label="Play/Pause">
            <svg viewBox="0 0 24 24" fill="currentColor" id="mini-play-icon">
              <path d="M8 5v14l11-7z"/>
            </svg>
          </button>
          <button class="icon-btn" id="mini-next" aria-label="Next">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2.5-6l5.5-4v8l-5.5-4z"/><rect x="16" y="6" width="2" height="12"/></svg>
          </button>
        </div>
      </div>

      <!-- Full Player Modal -->
      <div class="full-player hidden" id="full-player" role="dialog" aria-modal="true" aria-label="Music player">
        <div class="full-player__backdrop" id="player-backdrop"></div>
        <div class="full-player__sheet">
          <div class="full-player__drag-handle"></div>
          <button class="full-player__close icon-btn" id="close-player" aria-label="Close player">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </button>
          <div class="full-player__artwork-wrap">
            <img src="" alt="Album art" id="fp-artwork" class="full-player__artwork" />
            <div class="full-player__artwork-bg" id="fp-artwork-bg"></div>
          </div>
          <div class="full-player__info">
            <div class="full-player__title-row">
              <div>
                <h2 class="full-player__title" id="fp-title">Song Title</h2>
                <p class="full-player__artist" id="fp-artist">Artist</p>
              </div>
              <button class="icon-btn fav-btn" id="fp-fav" aria-label="Toggle favorite">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                </svg>
              </button>
            </div>
          </div>
          <div class="full-player__progress">
            <input type="range" id="fp-seek" class="seek-bar" min="0" max="100" value="0" aria-label="Seek" />
            <div class="full-player__time">
              <span id="fp-current-time">0:00</span>
              <span id="fp-duration">0:00</span>
            </div>
          </div>
          <div class="full-player__controls">
            <button class="icon-btn" id="fp-shuffle" aria-label="Shuffle" data-active="false">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
                <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
              </svg>
            </button>
            <button class="icon-btn control-btn" id="fp-prev" aria-label="Previous">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
            </button>
            <button class="play-pause-btn" id="fp-play" aria-label="Play/Pause">
              <svg viewBox="0 0 24 24" fill="currentColor" id="fp-play-icon"><path d="M8 5v14l11-7z"/></svg>
            </button>
            <button class="icon-btn control-btn" id="fp-next" aria-label="Next">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2.5-6l5.5-4v8l-5.5-4z"/><rect x="16" y="6" width="2" height="12"/></svg>
            </button>
            <button class="icon-btn" id="fp-repeat" aria-label="Repeat" data-mode="none">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
                <polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
              </svg>
            </button>
          </div>
          <!-- Volume -->
          <div class="full-player__volume">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;flex-shrink:0">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            </svg>
            <input type="range" id="fp-volume" class="volume-bar" min="0" max="1" step="0.01" value="1" aria-label="Volume" />
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;flex-shrink:0">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
            </svg>
          </div>

          <!-- EQ Button -->
          <div style="display:flex;justify-content:center;margin-top:12px;">
            <button id="fp-eq-btn" style="
              display:flex;align-items:center;gap:6px;
              padding:8px 20px;
              border-radius:var(--radius-full);
              background:rgba(168,85,247,0.12);
              border:1.5px solid rgba(168,85,247,0.3);
              color:var(--color-primary);
              font-size:0.8rem;font-weight:600;
              transition:all 0.15s;
            ">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px;">
                <line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/>
                <line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/>
                <line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/>
                <line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/>
                <line x1="17" y1="16" x2="23" y2="16"/>
              </svg>
              Equalizer
            </button>
          </div>
        </div>
      </div>

    </div><!-- /main-screen -->

    <!-- Toast notification -->
    <div id="toast-container" role="status" aria-live="polite"></div>

    <!-- Loading overlay -->
    <div id="loading-overlay" class="loading-overlay hidden">
      <div class="spinner"></div>
    </div>

  </div><!-- /app -->

  <!-- Audio element (managed by player.js) -->
  <audio id="audio-element" preload="metadata"></audio>

  <!-- Capacitor runtime (injected by Capacitor CLI) -->
  <script type="module" src="src/js/capacitor-init.js"></script>

  <!-- Canvas roundRect polyfill (older Android WebView) -->
  <script>
    if (!CanvasRenderingContext2D.prototype.roundRect) {
      CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
        if (w < 2*r) r = w/2;
        if (h < 2*r) r = h/2;
        this.beginPath();
        this.moveTo(x+r, y);
        this.arcTo(x+w, y,   x+w, y+h, r);
        this.arcTo(x+w, y+h, x,   y+h, r);
        this.arcTo(x,   y+h, x,   y,   r);
        this.arcTo(x,   y,   x+w, y,   r);
        this.closePath();
        return this;
      };
    }

    // Service Worker register karo (PWA ke liye)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(() => console.log('[SW] Registered'))
          .catch((e) => console.warn('[SW] Failed:', e));
      });
    }
  </script>

  <!-- App entry point -->
  <script type="module" src="src/js/app.js"></script>
</body>
</html>
