{% extends "base.html" %}
{% block title %}Sign Up - BusMS{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo"><i class="fas fa-bus"></i></div>
            <h1>Create Account</h1>
            <p>Join BusMS and start booking today</p>
        </div>

        <div id="alertBox" class="alert hidden"></div>

        <form id="signupForm" class="auth-form">
            <div class="form-group">
                <label for="name"><i class="fas fa-user"></i> Full Name</label>
                <input type="text" id="name" placeholder="Enter your full name" required>
            </div>
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Password</label>
                <div class="input-icon-right">
                    <input type="password" id="password" placeholder="Min 6 characters" required minlength="6">
                    <i class="fas fa-eye toggle-password" onclick="togglePassword('password')"></i>
                </div>
            </div>
            <div class="form-group">
                <label for="confirmPassword"><i class="fas fa-lock"></i> Confirm Password</label>
                <div class="input-icon-right">
                    <input type="password" id="confirmPassword" placeholder="Re-enter password" required>
                    <i class="fas fa-eye toggle-password" onclick="togglePassword('confirmPassword')"></i>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-full" id="signupBtn">
                <span>Create Account</span>
            </button>
        </form>

        <div class="auth-footer">
            <p>Already have an account? <a href="/login">Login</a></p>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    function togglePassword(id) {
        const pwd = document.getElementById(id);
        pwd.type = pwd.type === 'password' ? 'text' : 'password';
    }

    document.getElementById('signupForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirmPassword').value;

        if (password !== confirm) {
            showAlert('Passwords do not match', 'error');
            return;
        }

        const btn = document.getElementById('signupBtn');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account...';
        btn.disabled = true;

        try {
            const res = await fetch('/api/auth/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: document.getElementById('name').value,
                    email: document.getElementById('email').value,
                    password
                })
            });
            const data = await res.json();
            if (res.ok) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                showAlert('Account created! Redirecting...', 'success');
                setTimeout(() => { window.location.href = '/dashboard'; }, 800);
            } else {
                showAlert(data.error || 'Signup failed', 'error');
                btn.innerHTML = '<span>Create Account</span>';
                btn.disabled = false;
            }
        } catch {
            showAlert('Network error. Please try again.', 'error');
            btn.innerHTML = '<span>Create Account</span>';
            btn.disabled = false;
        }
    });

    function showAlert(msg, type) {
        const box = document.getElementById('alertBox');
        box.textContent = msg;
        box.className = `alert alert-${type}`;
    }
</script>
{% endblock %}
